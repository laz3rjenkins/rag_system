version: "3.9"

services:
  mariadb:
    image: mariadb:11
    container_name: rag_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Всё DB-конфиг + LLM + embedding теперь из .env (никакого хардкода!)
    volumes:
      - .:/app
      - ./models:/app/models
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mariadb_data: